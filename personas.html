<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2 - HTML y JS Común</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <a class="volver" href="index.html">← Volver al Inicio</a>
    <h1>Ejercicio 2: Formulario y Tabla (JS Común)</h1>

    <form id="formPersona">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="apellido" placeholder="Apellido" required>
        <input type="number" id="edad" placeholder="Edad" required>
        <input type="number" step="0.01" id="altura" placeholder="Altura (ej: 1.75)" required>
        <input type="number" step="0.1" id="peso" placeholder="Peso en kg (ej: 70)" required>
        <button type="submit" class="btn-agregar">Agregar Persona</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
                <th>Altura</th>
                <th>Peso</th>
                <th>IMC</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tablaCuerpo"></tbody>
    </table>

    <script src="personas.js"></script>
</body>
</html>
